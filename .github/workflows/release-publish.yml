name: Release And Publish VSIX

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build_test:
    name: Build And Test (Release Gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate semantic version in package.json
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ ! "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic version in package.json: $VERSION"
            exit 1
          fi
          echo "Semantic version validated: $VERSION"

      - name: Compile
        run: npm run compile

      - name: Test (if present)
        run: npm test --if-present

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-vsix-${{ github.run_id }}
          path: '*.vsix'
          if-no-files-found: error

  release_readiness:
    name: Release Readiness (PR)
    if: github.event_name == 'pull_request'
    needs: build_test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Summarise next semantic version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "## Release Readiness" >> "$GITHUB_STEP_SUMMARY"
          echo "Build and tests passed." >> "$GITHUB_STEP_SUMMARY"
          echo "Proposed release tag on merge: v${VERSION}" >> "$GITHUB_STEP_SUMMARY"

  release_publish:
    name: Release And Publish (Main Push)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build_test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Resolve release version
        id: meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download VSIX artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-vsix-${{ github.run_id }}
          path: dist

      - name: Create GitHub release and upload VSIX
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: AI Billing ${{ steps.meta.outputs.tag }}
          files: dist/*.vsix
          generate_release_notes: true
